name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  publish:
    if: github.repository == 'hamedb89/localghost'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Enable package manager
        run: corepack enable

      - name: Install dependencies
        run: corepack npm ci

      - name: Verify package and site
        run: corepack npm run release:check

      - name: Publish to npm
        run: corepack npm publish --access public --provenance
