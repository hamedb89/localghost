name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  verify:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Enable package manager
        run: corepack enable

      - name: Install dependencies
        run: corepack npm ci

      - name: Verify package and site
        run: corepack npm run release:check
